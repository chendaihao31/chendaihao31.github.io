# Research Atlas · GitHub Pages / Jekyll
# Repository: chendaihao31/chendaihao31.github.io

title: "Research Atlas"
description: >-
  收录论文调研、研究演示、开源工具与实验笔记，
  关注证据、复现、真实用户需求与可积累的研究经验。
author: "chendaihao31"
lang: "zh-CN"
timezone: "Asia/Shanghai"

# GitHub Pages user site: https://chendaihao31.github.io/
url: "https://chendaihao31.github.io"
baseurl: ""
repository: "chendaihao31/chendaihao31.github.io"

theme: jekyll-theme-cayman
show_downloads: false

markdown: kramdown
highlighter: rouge
permalink: pretty
future: false
unpublished: false

kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: mathjax

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      lang: "zh-CN"
      author: "chendaihao31"
      image: null
  - scope:
      path: "presentations"
      type: "pages"
    values:
      category: "Research Presentation"

sass:
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - scripts
  - tmp
  - .idea
  - .vscode

navigation:
  - title: "首页"
    url: "/"
  - title: "Auto Research"
    url: "/presentations/Auto-Research/"

research:
  updated_at: "2026-07-21"
  topics:
    - "AI Scientist 可靠性"
    - "LLM + HPO"
    - "种群与分支搜索"
    - "失败记忆"
    - "科研方案评测"
    - "长程智能体"
